name: bharat_brief
description: AI-powered multilingual news aggregator - Inshorts style for India.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.4
  # firebase_core: ^4.5.0       # Enable when google-services.json is added
  # cloud_firestore: ^6.1.3
  # firebase_messaging: ^16.1.2
  # firebase_analytics: ^12.1.3
  # google_mobile_ads: ^7.0.0   # Enable when AdMob is configured
  audioplayers: ^6.6.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.5
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
